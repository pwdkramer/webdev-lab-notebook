<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-light">
    <main class="d-flex align-items-center">
      <form
        method="post"
        class="ira-form container border border-2 rounded p-4 bg-white my-5"
      >
        <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="balance"
            >Balance ($):</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="balance"
              name="balance"
              required
            />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="contribution"
            >Annual Contribution ($)</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="contribution"
              name="contribution"
              required
            />
          </div>
        </div>

        <fieldset class="row mb-3">
          <legend class="col-sm-6 col-form-label">
            Maximize Contributions?
          </legend>
          <div class="col-sm-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="maximize-yes"
                name="maximize"
                value="yes"
              />
              <label class="form-check-label" for="maximize-yes"> Yes </label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="maximize-no"
                name="maximize"
                value="no"
              />
              <label class="form-check-label" for="maximize-no"> No </label>
            </div>
          </div>
        </fieldset>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="rate"
            >Expected rate of return (%):</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="rate"
              name="rate"
              step="0.1"
              required
            />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="current age"
            >Current age</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="current age"
              name="current age"
              required
            />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="Retirement age"
            >Retirement age</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="Retirement age"
              name="Retirement age"
              required
            />
          </div>
        </div>

        <div class="mb-3 row">
          <label class="col-sm-6 col-form-label" for="tax rate"
            >Marginal tax rate (%)</label
          >
          <div class="col-sm-6">
            <input
              class="form-control"
              type="number"
              id="tax rate"
              name="tax rate"
              step="0.1"
              required
            />
          </div>
        </div>

        <div class="my-4">
          <div class="d-flex gap-2">
            <button class="btn btn-primary w-100" type="submit">
              Calculate
            </button>
            <button class="btn btn-outline-dark w-100" type="reset">
              Reset
            </button>
          </div>
        </div>

        <p>
          This exercise is a simplified version of the Roth IRA Calculator at
          <a class="text-primary" href="https://www.calculator.net"
            >Calculator.net</a
          >
        </p>
      </form>
    </main>
  </body>
</html>
